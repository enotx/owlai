name: Build macOS Multi-Arch (Unsigned)

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest      # M1/M2 (arm64)
            arch_name: Apple-Silicon
          - runner: macos-15-intel           # Intel (x86_64)
            arch_name: Intel
    
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      
      - name: Cache Python Standalone
        uses: actions/cache@v4
        with:
          path: .cache/python-standalone
          key: python-standalone-${{ matrix.runner }}-${{ hashFiles('scripts/build-sidecar.sh') }}
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build Python sidecar
        run: |
          chmod +x scripts/build-sidecar.sh
          ./scripts/build-sidecar.sh
          # 你的 detect_platform() 会自动检测当前 runner 的架构
            
      - name: Prepare Next static export for Tauri
        run: |
          if [ -d "frontend/src/app/api" ]; then
            mv frontend/src/app/api frontend/src/app/__api_backup__
          fi
      - name: Build Tauri app (unsigned)
        working-directory: frontend
        run: npm run tauri:build
      - name: Restore Next API routes
        if: always()
        run: |
          if [ -d "frontend/src/app/__api_backup__" ]; then
            rm -rf frontend/src/app/api
            mv frontend/src/app/__api_backup__ frontend/src/app/api
          fi
      
      - name: Find Tauri DMG & prepare artifacts
        id: find-dmg
        run: |
          # Tauri 生成的 DMG 已包含 Applications 符号链接
          DMG_PATH=$(find frontend/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          
          if [ -z "$DMG_PATH" ]; then
            echo "❌ Tauri DMG not found in bundle/dmg/"
            find frontend/src-tauri/target/release/bundle -type f -name "*.dmg" || true
            exit 1
          fi
          
          echo "✅ Found Tauri DMG: $DMG_PATH"
          
          # 重命名为统一的产物名称
          FINAL_NAME="Owl-Installer-${{ matrix.arch_name }}-Unsigned.dmg"
          cp "$DMG_PATH" "$FINAL_NAME"
          echo "dmg_path=$FINAL_NAME" >> "$GITHUB_OUTPUT"
          
          # 生成安装说明
          cat > INSTALL_INSTRUCTIONS.txt << 'EOF'
          ⚠️  This is an UNSIGNED build for ${{ matrix.arch_name }} Macs

          To install on macOS:
          1. Mount the DMG
          2. Drag app to Applications
          3. Run: xattr -cr '/Applications/Owl Data Analyst.app'
          4. Launch the app
          EOF
      
      - name: Upload unsigned DMG
        uses: actions/upload-artifact@v4
        with:
          name: Owl-macOS-${{ matrix.arch_name }}-Unsigned-${{ github.sha }}
          path: |
            ${{ steps.find-dmg.outputs.dmg_path }}
            INSTALL_INSTRUCTIONS.txt
          retention-days: 7